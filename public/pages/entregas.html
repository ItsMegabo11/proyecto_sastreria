<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sastreria "Ponchos Blancos"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <aside class="sidebar">

    <div>

        <h3 class="sidebar-titulo">
            Menú
        </h3>

        <nav>

            <a href="dashboard.html" class="menu-link">
                Inicio
            </a>

            <a href="clientes.html" class="menu-link">
                Clientes
            </a>

            <a href="pedidos.html" class="menu-link">
                Pedidos
            </a>

            <a href="pagos.html" class="menu-link">
                Pagos
            </a>

            <a href="entregas.html" class="menu-link activo">
                Entregas
            </a>

        </nav>

    </div>

    <button
        class="btn btn-danger w-100"
        onclick="cerrarSesion()">

        Cerrar Sesión

    </button>

</aside>

<div class="contenido">

<header class="encabezado-principal">

    <h1>

        Sistema de Sastrería
        "Ponchos Blancos"

    </h1>

</header>

<main class="container-fluid p-4">

    <section class="mb-4">

        <h2>

            Gestión de Entregas

        </h2>

        <p>

            Administre todas las entregas registradas en el sistema.

        </p>

    </section>
    <article class="tarjeta-formulario">
        <form id="formEntrega">
            <input type="hidden" id="entrega_id">
            <div class="form-group-custom">
                <label for="final_delivery_date">Fecha Final de Entrega</label>
                <div class="divider"></div>
                <input type="date" id="final_delivery_date" required>
            </div>
            <div class="form-group-custom">
                <label for="delivery_address">Dirección de Entrega</label>
                <div class="divider"></div>
                <input type="text" id="delivery_address" required>
            </div>
            <div class="form-group-custom">
                <label for="phone">Teléfono</label>
                <div class="divider"></div>
                <input type="text" id="phone" maxlength="8" required>
            </div>
            <div class="form-group-custom">
                <label for="order_id">Pedido</label>
                <div class="divider"></div>
                <select id="order_id" class="form-select" required></select>
            </div>
            <div class="form-group-custom">
                <label for="delivery_status_id">Estado de Entrega</label>
                <div class="divider"></div>
                <select id="delivery_status_id" class="form-select" required></select>
            </div>
            <button type="submit" class="btn btn-success">Guardar</button>
            <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
        </form>
    </article>
    <article class="tarjeta-tabla mt-4">
        <div class="mb-3">
            <input
                type="text"
                id="buscador"
                class="form-control"
                placeholder="Buscar registros...">
        </div>
        <table
            class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Fecha</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>Pedido</th>
                    <th>Estado</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tabla">

            </tbody>

        </table>

    </article>

</main>
<script src="../js/config.js"></script>
<script src="../js/entregas.js"></script>
</div>

<script>

function cerrarSesion()
{
    localStorage.clear();

    window.location.href =
        "login.html";
}

</script>
</body>
</html>
