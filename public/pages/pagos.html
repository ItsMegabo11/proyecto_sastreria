<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sastreria "Ponchos Blancos"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <aside class="sidebar">
    <div>
        <h3 class="sidebar-titulo">
            Menú
        </h3>
        <nav>
            <a href="dashboard.html" class="menu-link">
                Inicio
            </a>
            <a href="clientes.html" class="menu-link">
                Clientes
            </a>
            <a href="pedidos.html" class="menu-link">
                Pedidos
            </a>
            <a href="pagos.html" class="menu-link activo">
                Pagos
            </a>
            <a href="entregas.html" class="menu-link">
                Entregas
            </a>
        </nav>
    </div>
    <button
        class="btn btn-danger w-100"
        onclick="cerrarSesion()">
        Cerrar Sesión
    </button>
</aside>
<div class="contenido">
<header class="encabezado-principal">
    <h1>Sistema de Sastrería "Ponchos Blancos"</h1>
</header>
<main class="container-fluid p-4">
    <section class="mb-4">
        <h2>Gestión de Pagos</h2>
        <p>Administre todos los pagos registrados en el sistema.</p>
    </section>
    <article class="tarjeta-formulario">
        <form id="formPago">
            <input type="hidden" id="pago_id">
            <div class="form-group-custom">
                <label for="amount">Monto</label>
                <div class="divider"></div>
                <input type="number" step="0.01" id="amount" required>
            </div>
            <div class="form-group-custom">
                <label for="payment_date">Fecha de Pago</label>
                <div class="divider"></div>
                <input type="date" id="payment_date" class="form-control" required>
            </div>
            <div class="form-group-custom">
                <label for="order_id">Pedido</label>
                <div class="divider"></div>
                <select id="order_id" class="form-select" required></select>
            </div>
            <div class="form-group-custom">
                <label for="payment_method_id">Método de Pago</label>
                <div class="divider"></div>
                <select id="payment_method_id" class="form-select" required></select>
            </div>
            <button type="submit" class="btn btn-success">Guardar</button>
            <button type="button" id="btnCancelar" class="btn btn-secondary">Cancelar</button>
        </form>
    </article>
    <article class="tarjeta-tabla mt-4">
        <div class="mb-3">
            <input
                type="text"
                id="buscador"
                class="form-control"
                placeholder="Buscar registros...">
        </div>
        <table
            class="table table-bordered table-striped">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Monto</th>
                    <th>Fecha</th>
                    <th>Pedido</th>
                    <th>Método</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tabla">

            </tbody>

        </table>

    </article>

</main>
<script src="../js/config.js"></script>
<script src="../js/pagos.js"></script>
</div>

<script>

function cerrarSesion()
{
    localStorage.clear();

    window.location.href =
        "login.html";
}

</script>
</body>
</html>
