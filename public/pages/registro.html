<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sastrería "Ponchos Blancos"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="pagina-auth">
    <section class="auth-container">
        <article class="auth-card registro-card">
            <h1 class="auth-logo">Sistema de Sastrería<br>Ponchos Blancos</h1>
            <p class="auth-subtitulo">
                Registro de nuevo empleado
            </p>
            <form id="registroForm">
                <h5 class="mb-3">Datos de acceso</h5>
                <div class="form-group-custom">
                    <label for="name">Nombre de Usuario</label>
                    <div class="divider"></div>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group-custom">
                    <label for="email">Correo Electrónico</label>
                    <div class="divider"></div>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group-custom">
                    <label for="password">Contraseña</label>
                    <div class="divider"></div>
                    <input type="password" id="password" required>
                </div>
                <div class="form-group-custom">
                    <label for="password_confirmation">Confirmar Contraseña</label>
                    <div class="divider"></div>
                    <input type="password" id="password_confirmation" required>
                </div>
                <h5 class="mb-3">Información del empleado</h5>
                <div class="form-group-custom">
                    <label for="first_name">Nombre</label>
                    <div class="divider"></div>
                    <input type="text" id="first_name" required>
                </div>
                <div class="form-group-custom">
                    <label for="last_name">Apellido</label>
                    <div class="divider"></div>
                    <input type="text" id="last_name" required>
                </div>
                <div class="form-group-custom">
                    <label for="phone">Teléfono</label>
                    <div class="divider"></div>
                    <input type="text" id="phone" maxlength="8" required>
                </div>
                <div class="form-group-custom">
                    <label for="hire_date">Fecha de Contratación</label>
                    <div class="divider"></div>
                    <input type="date" id="hire_date" required>
                </div>
                <div class="form-group-custom">
                    <label for="salary">Salario</label>
                    <div class="divider"></div>
                    <input type="number" id="salary" required>
                </div>     
                <button type="submit" class="btn btn-success w-100">Registrarse</button>
            </form>
            <p class="text-center mt-4">
                <a href="login.html">Volver al Login</a>
            </p>
        </article>
    </section>
    <script src="../js/auth.js"></script>
</body>
</html>
