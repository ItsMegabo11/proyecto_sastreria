<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sastrería "Ponchos Blancos"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body class="pagina-auth">
    <section class="auth-container">
        <article class="auth-card registro-card">
            <h1 class="auth-logo">Sistema de Sastrería<br>Ponchos Blancos</h1>
            <p class="auth-subtitulo">
                Registro de nuevo empleado
            </p>
            <form id="registroForm">
                <h5 class="mb-3">Datos de acceso</h5>
                <input type="text" id="name" class="form-control mb-3" placeholder="Nombre de usuario" required>
                <input type="email" id="email" class="form-control mb-3" placeholder="Correo electrónico" required>
                <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña" required>
                <input type="password" id="password_confirmation" class="form-control mb-4" placeholder="Confirmar contraseña" required>
                <h5 class="mb-3">Información del empleado</h5>
                <input type="text" id="first_name" class="form-control mb-3" placeholder="Nombre" required>
                <input type="text" id="last_name" class="form-control mb-3" placeholder="Apellido" required>
                <input type="text" id="phone" class="form-control mb-3" placeholder="Teléfono" maxlength="8" required>
                <input type="date" id="hire_date" class="form-control mb-3" required>
                <input type="number" id="salary" class="form-control mb-4" placeholder="Salario" required>
                <button type="submit" class="btn btn-success w-100">Registrarse</button>
            </form>
            <p class="text-center mt-4">
                <a href="login.html">Volver al Login</a>
            </p>
        </article>
    </section>
    <script src="../js/auth.js"></script>
</body>
</html>
