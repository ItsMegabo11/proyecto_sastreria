<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Sastreria "Ponchos Blancos"</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <aside class="sidebar">
        <section>
            <h3 class="sidebar-titulo">Menú</h3>
            <nav>
                <a href="dashboard.html" class="menu-link">Inicio</a>
                <a href="clientes.html" class="menu-link activo">Clientes</a>
                <a href="pedidos.html" class="menu-link">Pedidos</a>

                <a
                href="pagos.html"
                class="menu-link">

                Pagos

            </a>

            <a
                href="entregas.html"
                class="menu-link">

                Entregas

            </a>

        </nav>

    </section>

    <button
        class="btn btn-danger w-100"
        onclick="cerrarSesion()">

        Cerrar Sesión

    </button>


    </aside>

    <section class="contenido">


    <header class="encabezado-principal">

        <h1>

            Sistema de Sastrería
            "Ponchos Blancos"

        </h1>

    </header>

    <main class="container-fluid p-4">

        <section class="mb-4">

            <h2>

                Gestión de Clientes

            </h2>

            <p>

                Administre la información de los clientes registrados.

            </p>

        </section>

        <article class="tarjeta-formulario">

            <form id="formCliente">

                <input
                    type="hidden"
                    id="cliente_id">

                <input
                    type="text"
                    id="first_name"
                    class="form-control mb-3"
                    placeholder="Nombre"
                    required>

                <input
                    type="text"
                    id="last_name"
                    class="form-control mb-3"
                    placeholder="Apellido"
                    required>

                <input
                    type="text"
                    id="phone"
                    class="form-control mb-3"
                    placeholder="Teléfono"
                    required>

                <input
                    type="text"
                    id="address"
                    class="form-control mb-3"
                    placeholder="Dirección"
                    required>

                <select
                    id="employee_id"
                    class="form-select mb-3"
                    required>

                </select>

                <button
                    type="submit"
                    class="btn btn-success">

                    Guardar

                </button>

                <button
                    type="button"
                    id="btnCancelar"
                    class="btn btn-secondary">

                    Cancelar

                </button>

            </form>

        </article>

        <article class="tarjeta-tabla mt-4">

            <div class="mb-3">

        <input
            type="text"
            id="buscador"
            class="form-control"
            placeholder="Buscar registros...">

    </div>
            <table
                class="table table-bordered table-striped align-middle">

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Apellido</th>
                        <th>Teléfono</th>
                        <th>Dirección</th>
                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tabla">

                </tbody>

            </table>

        </article>

    </main>


    </section>

    <script>

    function cerrarSesion()
    {
        localStorage.clear();

        window.location.href =
            "login.html";
    }

    </script>

    <script src="../js/config.js"></script>
    <script src="../js/clientes.js"></script>
</body>
</html>
